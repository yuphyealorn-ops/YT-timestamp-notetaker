<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Timestamp Notetaker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Video History</span>
      <button id="closeSidebar" class="sidebar-close">✕</button>
    </div>
    <div id="historyList" class="history-list">
      <div class="empty-state small">No saved videos yet.</div>
    </div>
  </aside>

  <div id="confirmOverlay" class="confirm-overlay hidden">
    <div class="confirm-box">
      <p class="confirm-msg">Clear all notes for this video?</p>
      <div class="confirm-actions">
        <button id="confirmCancel" class="confirm-btn cancel">Cancel</button>
        <button id="confirmOk" class="confirm-btn ok">Clear</button>
      </div>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="header-left">
        <button id="historyBtn" class="icon-btn" title="Video history">☰</button>
        <div class="logo">
          <span class="logo-icon">▶</span>
          <span class="logo-text">NoteStamp</span>
        </div>
      </div>
      <div class="actions">
        <button id="exportBtn" title="Export notes">↓ Export</button>
        <button id="clearBtn" title="Clear all notes">✕ Clear</button>
      </div>
    </header>

    <div id="videoInfo" class="video-info hidden">
      <div class="video-title" id="videoTitle">—</div>
    </div>

    <div class="input-area">
      <div class="timestamp-row">
        <div class="timestamp-badge" id="currentTimestamp">0:00</div>
        <button id="liveBtn" class="live-btn">⬤ Live</button>
        <button id="captureBtn" class="capture-btn">⬤ Capture Time</button>
      </div>
      <textarea
        id="noteInput"
        placeholder="Type your note here…"
        rows="3"
      ></textarea>
      <button id="addNoteBtn" class="add-btn">Add Note</button>
    </div>

    <div class="notes-section">
      <div class="notes-header">
        <span>Notes</span>
        <span id="noteCount" class="count">0</span>
      </div>
      <div id="notesList" class="notes-list">
        <div class="empty-state">
          <p>No notes yet.</p>
          <p>Open a YouTube video, capture a timestamp, and start noting!</p>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
